# pdns and the test slave get static addresses on dnsnet so NOTIFY targets
# (ALSO_NOTIFY_IPS) and the slave's master IP survive container restarts.
networks:
  dnsnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.89.99.0/24

services:
  postgres:
    image: postgres:16-alpine
    networks: [dnsnet]
    environment:
      POSTGRES_DB: dns
      POSTGRES_USER: dns
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dns -d dns"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  pdns:
    image: powerdns/pdns-auth-49:4.9.4
    networks:
      dnsnet:
        ipv4_address: 10.89.99.10
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PDNS_API_KEY: ${PDNS_API_KEY:?set in .env}
      ALSO_NOTIFY_IPS: ${ALSO_NOTIFY_IPS:-}
      ALLOW_AXFR_IPS: ${ALLOW_AXFR_IPS:-}
    entrypoint: ["/entrypoint.sh"]
    volumes:
      - ./pdns/pdns.conf.tpl:/pdns.conf.tpl:ro
      - ./pdns/entrypoint.sh:/entrypoint.sh:ro
    ports:
      # hidden primary: reachable by the NSD secondaries only — firewall this
      # to the slave IPs in production. pdns listens on 1053 in-container
      # (local-port in pdns.conf.tpl); rootless podman/docker cannot bind
      # host ports <1024 — set DNS_PORT=53 only on a rootful production host
      # (or raise net.ipv4.ip_unprivileged_port_start).
      - "${DNS_PORT:-1053}:1053/udp"
      - "${DNS_PORT:-1053}:1053/tcp"
    healthcheck:
      test: ["CMD", "pdns_control", "--socket-dir=/tmp/pdns", "rping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: ./app
    networks: [dnsnet]
    depends_on:
      postgres:
        condition: service_healthy
      pdns:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://dns:${POSTGRES_PASSWORD}@postgres/dns
      PDNS_API_URL: http://pdns:8081/api/v1
      PDNS_API_KEY: ${PDNS_API_KEY}
      SESSION_SECRET: ${SESSION_SECRET:?set in .env}
      CATALOG_ZONE: ${CATALOG_ZONE:-catalog.mojodns.}
      DEFAULT_SOA_NS: ${DEFAULT_SOA_NS:-ns1.example.net.}
      DEFAULT_SOA_MAIL: ${DEFAULT_SOA_MAIL:-hostmaster.example.net.}
      DEFAULT_NAMESERVERS: ${DEFAULT_NAMESERVERS:-ns1.example.net.,ns2.example.net.}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      TSIG_KEY: ${TSIG_KEY:-}
      TSIG_SECRET: ${TSIG_SECRET:-}
      TSIG_ALGO: ${TSIG_ALGO:-hmac-sha256}
      TSIG_EXTRA_KEYS: ${TSIG_EXTRA_KEYS:-}
      PDNS_AXFR_HOST: pdns
      PDNS_AXFR_PORT: 1053
      VERIFY_RESOLVERS: ${VERIFY_RESOLVERS:-1.1.1.1,8.8.8.8}
      VERIFY_INTERVAL_HOURS: ${VERIFY_INTERVAL_HOURS:-24}
    ports:
      - "${WEB_PORT:-8000}:8000"
    restart: unless-stopped

  # optional local test secondary: docker compose --profile slave up
  nsd-slave:
    build: ./nsd-slave
    profiles: ["slave"]
    networks:
      dnsnet:
        ipv4_address: 10.89.99.53
    environment:
      MASTER_IP: 10.89.99.10
      CATALOG_ZONE: ${CATALOG_ZONE:-catalog.mojodns.}
      TSIG_NAME: ${TSIG_KEY:-}
      TSIG_ALGO: ${TSIG_ALGO:-hmac-sha256}
      TSIG_SECRET: ${TSIG_SECRET:-}
    depends_on:
      pdns:
        condition: service_healthy
    ports:
      - "${SLAVE_PORT:-15353}:1053/udp"
      - "${SLAVE_PORT:-15353}:1053/tcp"

volumes:
  pgdata:
