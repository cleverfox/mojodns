{% extends "base.html" %}
{% block title %}change password · mojodns{% endblock %}
{% block content %}

<div class="crumbs"><a href="/account">account</a> <span>/</span> <strong>password</strong></div>

<section class="panel">
  <div class="panel-head"><h1>change password</h1></div>
  {% if forced %}
  <div class="flash flash-warn">Your password is temporary or expired — please set a new
    one to continue.</div>
  {% endif %}
  <form method="post" action="/account/password" class="grid-form">
    <label class="span2">current password <input name="current" type="password" required autofocus></label>
    <label class="span2">new password <input name="new" type="password" minlength="8" required
           placeholder="at least 8 characters"></label>
    <label class="span2">confirm new password <input name="confirm" type="password" minlength="8" required></label>
    <button class="btn btn-primary span2" type="submit">change password ▸</button>
  </form>
</section>

{% endblock %}
